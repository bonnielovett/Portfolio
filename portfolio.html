<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Bonnie Davidson</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="data.js" defer></script>
  <script defer>
    const sectionDetails = {
      Drawings: {
        description: 'Six expressive studies in charcoal and line.',
        bannerClass: 'banner-drawings'
      },
      Foundation: {
        description: 'Five works that explore 2D and 3D fundamentals.',
        bannerClass: 'banner-foundation'
      },
      Concentration: {
        description: 'Ten immersive works that foreground sculptural play.',
        bannerClass: 'banner-concentration'
      }
    };

    function createThumbnail(item) {
      const link = document.createElement('a');
      link.className = 'gallery-item';
      link.href = `detail.html?item=${encodeURIComponent(item.id)}`;

      const image = document.createElement('img');
      image.src = item.file;
      image.alt = `${item.title} by Bonnie Davidson`;

      const figcaption = document.createElement('figcaption');
      const titleSpan = document.createElement('span');
      titleSpan.className = 'image-title';
      const em = document.createElement('em');
      const strong = document.createElement('strong');
      strong.textContent = item.title;
      em.appendChild(strong);
      titleSpan.appendChild(em);
      figcaption.appendChild(titleSpan);

      link.appendChild(image);
      link.appendChild(figcaption);
      return link;
    }

    function renderPortfolio() {
      const portfolioData = typeof portfolioItems !== 'undefined' ? portfolioItems : window.portfolioItems;

      if (!Array.isArray(portfolioData)) {
        console.error('Missing portfolioItems data. Ensure data.js is loaded.');
        return;
      }

      const main = document.getElementById('portfolioMain');
      main.innerHTML = '';

      const itemsBySection = portfolioData.reduce((acc, item) => {
        if (!acc[item.section]) {
          acc[item.section] = [];
        }
        acc[item.section].push(item);
        return acc;
      }, {});

      const sectionOrder = Object.keys(sectionDetails).filter((section) => itemsBySection[section]);

      sectionOrder.forEach((sectionName) => {
        const details = sectionDetails[sectionName] || {};
        const section = document.createElement('section');
        section.className = 'category-section';

        const banner = document.createElement('div');
        banner.className = `section-banner ${details.bannerClass || ''}`.trim();

        const heading = document.createElement('h2');
        heading.textContent = sectionName;
        const description = document.createElement('p');
        description.textContent = details.description || '';

        banner.appendChild(heading);
        banner.appendChild(description);
        section.appendChild(banner);

        const gallery = document.createElement('div');
        gallery.className = 'gallery-grid';

        itemsBySection[sectionName].forEach((item) => {
          gallery.appendChild(createThumbnail(item));
        });

        section.appendChild(gallery);
        main.appendChild(section);
      });
    }

    window.addEventListener('DOMContentLoaded', renderPortfolio);
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand">
        <div class="brand-mark">B</div>
        <div>
          <h1>Portfolio</h1>
        </div>
      </div>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="portfolio.html">Portfolio</a>
        <a class="nav-link" href="about.html">About</a>
      </nav>
    </header>

    <main id="portfolioMain"></main>

    <footer class="site-footer">
      <p><a href="index.html">Home</a> · <a href="about.html">About</a></p>
    </footer>
  </div>
</body>
</html>
